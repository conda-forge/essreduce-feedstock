context:
  name: essreduce
  version: "26.6.1"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/essreduce-${{ version }}.tar.gz
  sha256: 17ef9350aaf5df58e5ca3a311810f795eb4b19326272953ed12a53cf0609d17d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - grow-nexus = ess.reduce.scripts.grow_nexus:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=77
    - setuptools-scm >=8.0
    - pip
  run:
    - python >=${{ python_min }}
    - dask >=2022.1.0
    - python-graphviz >=0.20
    - sciline >=25.11.0
    - scipp >=26.3.1
    - scippneutron >=26.5.0
    - scippnexus >=25.06.0
    - scipy >=1.14

tests:
  - python:
      imports:
        - ess
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - grow-nexus --help

about:
  summary: Common data reduction tools for the ESS facility
  license: BSD-3-Clause
  license_file: LICENSE
  repository: https://github.com/scipp/ess/tree/main/packages/essreduce
  homepage: https://scipp.github.io/ess/reduce/

extra:
  recipe-maintainers:
    - MridulS
    - conda-forge/scipp
